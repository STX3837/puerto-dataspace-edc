      - EDC_IAM_STS_OAUTH_CLIENT_SECRET_ALIAS=health-sts-client-secret
      - EDC_VAULT_HASHICORP_URL=http://host.docker.internal:8200
      - EDC_VAULT_HASHICORP_TOKEN=root
      - EDC_HOSTNAME=health-controlplane
      - WEB_HTTP_PORT=19191
      - WEB_HTTP_PATH=/api
      - WEB_HTTP_MANAGEMENT_PORT=19193
      - WEB_HTTP_MANAGEMENT_PATH=/management
      - WEB_HTTP_MANAGEMENT_AUTH_KEY=provider-api-key
      - WEB_HTTP_PROTOCOL_PORT=19292
      - WEB_HTTP_PROTOCOL_PATH=/protocol
      - WEB_HTTP_CONTROL_PORT=19194
      - WEB_HTTP_CONTROL_PATH=/control
      - EDC_DSP_CALLBACK_ADDRESS=http://health-controlplane:19292/protocol
      - edc.iam.trusted-issuer.consumer.id=did:web:consumer-identityhub%3A7083:consumer
      - 'edc.iam.trusted-issuer.consumer.supportedtypes=["VerifiablePresentation","EnvelopedVerifiablePresentation","VerifiableCredential","EnvelopedVerifiableCredential","MembershipCredential"]'
      - edc.iam.did.web.use.https=false
      - edc.iam.trusted-issuer.issuer.id=did:web:issuer-service%3A10016:issuer
      - 'edc.iam.trusted-issuer.issuer.supportedtypes=["VerifiableCredential","EnvelopedVerifiableCredential","MembershipCredential","BitstringStatusListCredential"]'
      - edc.iam.credential.revocation.mimetype=application/json

  health-dataplane:
    image: puerto-edc-dataplane:latest
    container_name: health-dataplane
    ports:
      - "21294:19294"
    environment:
      EDC_PARTICIPANT_ID: did:web:health-identityhub%3A8183:health
      EDC_TRANSFER_PROXY_TOKEN_SIGNER_PRIVATEKEY_ALIAS: private-key
      EDC_TRANSFER_PROXY_TOKEN_VERIFIER_PUBLICKEY_ALIAS: public-key
