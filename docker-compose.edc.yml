services:
  provider-controlplane:
    image: puerto-edc-controlplane:latest
    container_name: provider-controlplane
    ports:
      - "19193:19193"
      - "19291:19291"
      - "19292:19292"
      - "19194:19194"
    environment:
      - EDC_PARTICIPANT_ID=did:web:provider-identityhub%3A8183:provider
      - EDC_IAM_ISSUER_ID=did:web:provider-identityhub%3A8183:provider
      - EDC_IAM_STS_OAUTH_TOKEN_URL=http://provider-identityhub:8184/api/sts/token
      - EDC_IAM_STS_OAUTH_CLIENT_ID=did:web:provider-identityhub%3A8183:provider
      - EDC_IAM_STS_OAUTH_CLIENT_SECRET_ALIAS=regulatory-clearance-provider-sts-client-secret
      - EDC_VAULT_HASHICORP_URL=http://host.docker.internal:8200
      - EDC_VAULT_HASHICORP_TOKEN=root
      - EDC_HOSTNAME=provider-controlplane
      - WEB_HTTP_PORT=19191
      - WEB_HTTP_PATH=/api
      - WEB_HTTP_MANAGEMENT_PORT=19193
      - WEB_HTTP_MANAGEMENT_PATH=/management
      - WEB_HTTP_MANAGEMENT_AUTH_KEY=provider-api-key
      - WEB_HTTP_PROTOCOL_PORT=19292
      - WEB_HTTP_PROTOCOL_PATH=/protocol
      - WEB_HTTP_CONTROL_PORT=19194
      - WEB_HTTP_CONTROL_PATH=/control
      - EDC_DSP_CALLBACK_ADDRESS=http://provider-controlplane:19292/protocol
      - edc.iam.trusted-issuer.consumer.id=did:web:consumer-identityhub%3A7083:consumer
      - 'edc.iam.trusted-issuer.consumer.supportedtypes=["VerifiablePresentation","EnvelopedVerifiablePresentation","VerifiableCredential","EnvelopedVerifiableCredential","MembershipCredential"]'
      - edc.iam.did.web.use.https=false
      - edc.iam.trusted-issuer.issuer.id=did:web:issuer-service%3A10016:issuer
      - 'edc.iam.trusted-issuer.issuer.supportedtypes=["VerifiableCredential","EnvelopedVerifiableCredential","MembershipCredential","BitstringStatusListCredential"]'
      - edc.iam.credential.revocation.mimetype=application/json

  provider-dataplane:
    image: puerto-edc-dataplane:latest
    container_name: provider-dataplane
    ports:
      - "19294:19294"
    environment:
      EDC_PARTICIPANT_ID: did:web:provider-identityhub%3A8183:provider
      EDC_TRANSFER_PROXY_TOKEN_SIGNER_PRIVATEKEY_ALIAS: private-key
      EDC_TRANSFER_PROXY_TOKEN_VERIFIER_PUBLICKEY_ALIAS: public-key
      EDC_VAULT_HASHICORP_URL: http://host.docker.internal:8200
      EDC_VAULT_HASHICORP_TOKEN: root
      EDC_DPF_SELECTOR_URL: http://provider-controlplane:19194/control/v1/dataplanes
      EDC_HOSTNAME: provider-dataplane
      EDC_DATAPLANE_API_PUBLIC_BASEURL: http://provider-dataplane:19294/public
      WEB_HTTP_PORT: 19291
      WEB_HTTP_PATH: /api
      WEB_HTTP_CONTROL_PORT: 19292
      WEB_HTTP_CONTROL_PATH: /control
      WEB_HTTP_PUBLIC_PORT: 19294
      WEB_HTTP_PUBLIC_PATH: /public

  health-controlplane:
    image: puerto-edc-controlplane:latest
    container_name: health-controlplane
    ports:
      - "21193:19193"
      - "21292:19292"
      - "21194:19194"
