    container_name: civilguard-controlplane
    ports:
      - "22193:19193"
      - "22292:19292"
      - "22194:19194"
    environment:
      - EDC_PARTICIPANT_ID=did:web:civilguard-identityhub%3A8183:civilguard
      - EDC_IAM_ISSUER_ID=did:web:civilguard-identityhub%3A8183:civilguard
      - EDC_IAM_STS_OAUTH_TOKEN_URL=http://civilguard-identityhub:8184/api/sts/token
      - EDC_IAM_STS_OAUTH_CLIENT_ID=did:web:civilguard-identityhub%3A8183:civilguard
      - EDC_IAM_STS_OAUTH_CLIENT_SECRET_ALIAS=civilguard-sts-client-secret
      - EDC_VAULT_HASHICORP_URL=http://host.docker.internal:8200
      - EDC_VAULT_HASHICORP_TOKEN=root
      - EDC_HOSTNAME=civilguard-controlplane
      - WEB_HTTP_PORT=19191
      - WEB_HTTP_PATH=/api
      - WEB_HTTP_MANAGEMENT_PORT=19193
      - WEB_HTTP_MANAGEMENT_PATH=/management
      - WEB_HTTP_MANAGEMENT_AUTH_KEY=provider-api-key
      - WEB_HTTP_PROTOCOL_PORT=19292
      - WEB_HTTP_PROTOCOL_PATH=/protocol
      - WEB_HTTP_CONTROL_PORT=19194
      - WEB_HTTP_CONTROL_PATH=/control
      - EDC_DSP_CALLBACK_ADDRESS=http://civilguard-controlplane:19292/protocol
      - edc.iam.trusted-issuer.consumer.id=did:web:consumer-identityhub%3A7083:consumer
      - 'edc.iam.trusted-issuer.consumer.supportedtypes=["VerifiablePresentation","EnvelopedVerifiablePresentation","VerifiableCredential","EnvelopedVerifiableCredential","MembershipCredential"]'
      - edc.iam.did.web.use.https=false
      - edc.iam.trusted-issuer.issuer.id=did:web:issuer-service%3A10016:issuer
      - 'edc.iam.trusted-issuer.issuer.supportedtypes=["VerifiableCredential","EnvelopedVerifiableCredential","MembershipCredential","BitstringStatusListCredential"]'
      - edc.iam.credential.revocation.mimetype=application/json

  civilguard-dataplane:
    image: puerto-edc-dataplane:latest
    container_name: civilguard-dataplane
    ports:
      - "22294:19294"
    environment:
      EDC_PARTICIPANT_ID: did:web:civilguard-identityhub%3A8183:civilguard
      EDC_TRANSFER_PROXY_TOKEN_SIGNER_PRIVATEKEY_ALIAS: private-key
      EDC_TRANSFER_PROXY_TOKEN_VERIFIER_PUBLICKEY_ALIAS: public-key
      EDC_VAULT_HASHICORP_URL: http://host.docker.internal:8200
      EDC_VAULT_HASHICORP_TOKEN: root
      EDC_DPF_SELECTOR_URL: http://civilguard-controlplane:19194/control/v1/dataplanes
      EDC_HOSTNAME: civilguard-dataplane
      EDC_DATAPLANE_API_PUBLIC_BASEURL: http://civilguard-dataplane:19294/public
      WEB_HTTP_PORT: 19291
      WEB_HTTP_PATH: /api
      WEB_HTTP_CONTROL_PORT: 19292
      WEB_HTTP_CONTROL_PATH: /control
      WEB_HTTP_PUBLIC_PORT: 19294
      WEB_HTTP_PUBLIC_PATH: /public

  consumer-controlplane:
    image: puerto-edc-controlplane:latest
    container_name: consumer-controlplane
    ports:
      - "29193:29193"
      - "29292:29292"
      - "29194:29194"
    environment:
      - EDC_PARTICIPANT_ID=did:web:consumer-identityhub%3A7083:consumer
      - EDC_IAM_ISSUER_ID=did:web:consumer-identityhub%3A7083:consumer
      - EDC_IAM_STS_OAUTH_TOKEN_URL=http://consumer-identityhub:7084/api/sts/token
      - EDC_IAM_STS_OAUTH_CLIENT_ID=did:web:consumer-identityhub%3A7083:consumer
      - EDC_IAM_STS_OAUTH_CLIENT_SECRET_ALIAS=transport-company-a-sts-client-secret
      - EDC_VAULT_HASHICORP_URL=http://host.docker.internal:8200
      - EDC_VAULT_HASHICORP_TOKEN=root
      - EDC_HOSTNAME=consumer-controlplane
      - WEB_HTTP_PORT=29191
      - WEB_HTTP_PATH=/api
      - WEB_HTTP_MANAGEMENT_PORT=29193
      - WEB_HTTP_MANAGEMENT_PATH=/management
      - WEB_HTTP_MANAGEMENT_AUTH_KEY=consumer-api-key
      - WEB_HTTP_PROTOCOL_PORT=29292
      - WEB_HTTP_PROTOCOL_PATH=/protocol
      - WEB_HTTP_CONTROL_PORT=29194
      - WEB_HTTP_CONTROL_PATH=/control
      - EDC_DSP_CALLBACK_ADDRESS=http://consumer-controlplane:29292/protocol
      - edc.iam.trusted-issuer.provider.id=did:web:provider-identityhub%3A8183:provider
      - 'edc.iam.trusted-issuer.provider.supportedtypes=["VerifiableCredential","EnvelopedVerifiableCredential","VerifiablePresentation","EnvelopedVerifiablePresentation","MembershipCredential"]'
      - edc.iam.trusted-issuer.health.id=did:web:health-identityhub%3A8183:health
      - 'edc.iam.trusted-issuer.health.supportedtypes=["VerifiableCredential","EnvelopedVerifiableCredential","VerifiablePresentation","EnvelopedVerifiablePresentation","MembershipCredential"]'
      - edc.iam.trusted-issuer.civilguard.id=did:web:civilguard-identityhub%3A8183:civilguard
      - 'edc.iam.trusted-issuer.civilguard.supportedtypes=["VerifiableCredential","EnvelopedVerifiableCredential","VerifiablePresentation","EnvelopedVerifiablePresentation","MembershipCredential"]'
      - edc.iam.did.web.use.https=false
      - edc.iam.trusted-issuer.issuer.id=did:web:issuer-service%3A10016:issuer
      - 'edc.iam.trusted-issuer.issuer.supportedtypes=["VerifiableCredential","EnvelopedVerifiableCredential","MembershipCredential","BitstringStatusListCredential"]'
      - edc.iam.credential.revocation.mimetype=application/json

  consumer-dataplane:
    image: puerto-edc-dataplane:latest
    container_name: consumer-dataplane
    ports:
      - "29294:29294"
    environment:
      EDC_PARTICIPANT_ID: did:web:consumer-identityhub%3A7083:consumer
      EDC_TRANSFER_PROXY_TOKEN_SIGNER_PRIVATEKEY_ALIAS: private-key
      EDC_TRANSFER_PROXY_TOKEN_VERIFIER_PUBLICKEY_ALIAS: public-key
      EDC_VAULT_HASHICORP_URL: http://host.docker.internal:8200
      EDC_VAULT_HASHICORP_TOKEN: root
      EDC_DPF_SELECTOR_URL: http://consumer-controlplane:29194/control/v1/dataplanes
      EDC_HOSTNAME: consumer-dataplane
      EDC_DATAPLANE_API_PUBLIC_BASEURL: http://consumer-dataplane:29294/public
      WEB_HTTP_PORT: 29291
      WEB_HTTP_PATH: /api
      WEB_HTTP_CONTROL_PORT: 29292
      WEB_HTTP_CONTROL_PATH: /control
      WEB_HTTP_PUBLIC_PORT: 29294
      WEB_HTTP_PUBLIC_PATH: /public

  mock-api:
    build: ./mock-api
    container_name: regulatory-clearance-api
    ports:
      - "8081:8081"

  provider-identityhub:
    image: puerto-identityhub-mvd:latest
    container_name: provider-identityhub
    ports:
      - "7180:8180"
      - "7181:8181"
      - "7182:8182"
      - "7183:8183"
      - "7184:8184"
    volumes:
      - ./config/provider-identityhub.properties:/app/dataspaceconnector-configuration.properties
    
    depends_on:
      - provider-identityhub-postgres

  health-identityhub:
    image: puerto-identityhub-mvd:latest
    container_name: health-identityhub
    ports:
      - "7380:8180"
      - "7381:8181"
      - "7382:8182"
      - "7383:8183"
      - "7384:8184"
    volumes:
      - ./config/health-identityhub.properties:/app/dataspaceconnector-configuration.properties

    depends_on:
      - health-identityhub-postgres

  civilguard-identityhub:
    image: puerto-identityhub-mvd:latest
    container_name: civilguard-identityhub
    ports:
      - "7480:8180"
      - "7481:8181"
      - "7482:8182"
      - "7483:8183"
      - "7484:8184"
    volumes:
      - ./config/civilguard-identityhub.properties:/app/dataspaceconnector-configuration.properties

    depends_on:
      - civilguard-identityhub-postgres

  consumer-identityhub:
    image: puerto-identityhub-mvd:latest
    container_name: consumer-identityhub
    ports:
      - "7280:7080"
      - "7281:7081"
      - "7282:7082"
      - "7283:7083"
      - "7284:7084"
    volumes:
      - ./config/consumer-identityhub.properties:/app/dataspaceconnector-configuration.properties
    
    depends_on:
      - consumer-identityhub-postgres
  
  provider-identityhub-postgres:
    image: postgres:16
    container_name: provider-identityhub-postgres
    environment:
      POSTGRES_DB: identityhub
      POSTGRES_USER: identityhub
      POSTGRES_PASSWORD: identityhub
    ports:
      - "7432:5432"

  health-identityhub-postgres:
    image: postgres:16
    container_name: health-identityhub-postgres
    environment:
      POSTGRES_DB: identityhub
      POSTGRES_USER: identityhub
      POSTGRES_PASSWORD: identityhub
    ports:
      - "7434:5432"

  civilguard-identityhub-postgres:
    image: postgres:16
    container_name: civilguard-identityhub-postgres
    environment:
      POSTGRES_DB: identityhub
      POSTGRES_USER: identityhub
      POSTGRES_PASSWORD: identityhub
    ports:
      - "7435:5432"

  consumer-identityhub-postgres:
    image: postgres:16
    container_name: consumer-identityhub-postgres
    environment:
      POSTGRES_DB: identityhub
      POSTGRES_USER: identityhub
      POSTGRES_PASSWORD: identityhub
    ports:
      - "7433:5432"
  
  issuer-postgres:
    image: postgres:16
    container_name: issuer-postgres
    ports:
      - "7444:5432"
    environment:
      POSTGRES_USER: issuer
      POSTGRES_PASSWORD: issuer
      POSTGRES_DB: issuerservice

  issuer-service:
    image: puerto-issuerservice-mvd:latest
    container_name: issuer-service
    ports:
      - "10010:10010"
      - "10011:10011"
      - "10012:10012"
      - "10013:10013"
      - "10015:10015"
      - "10016:10016"
      - "9999:9999"
    environment:
      - edc.hostname=issuer-service
      - edc.issuer.statuslist.signing.key.alias=statuslist-signing-key
      - edc.ih.api.superuser.key=c3VwZXItdXNlcg==.c3VwZXItc2VjcmV0LWtleQo=
      - edc.iam.did.web.use.https=false

      - web.http.port=10010
      - web.http.path=/api
      - web.http.sts.port=10011
      - web.http.sts.path=/api/sts
      - web.http.issuance.port=10012
      - web.http.issuance.path=/api/issuance
      - web.http.issueradmin.port=10013
      - web.http.issueradmin.path=/api/admin
      - web.http.identity.port=10015
      - web.http.identity.path=/api/identity
      - web.http.did.port=10016
      - web.http.did.path=/
      - web.http.statuslist.port=9999
      - web.http.statuslist.path=/statuslist

      - edc.vault.hashicorp.url=http://host.docker.internal:8200
      - edc.vault.hashicorp.token=root

      - edc.datasource.default.url=jdbc:postgresql://issuer-postgres:5432/issuerservice
      - edc.datasource.default.user=issuer
      - edc.datasource.default.password=issuer
      - edc.sql.schema.autocreate=true

      - edc.datasource.membership.url=jdbc:postgresql://issuer-postgres:5432/issuerservice
      - edc.datasource.membership.user=issuer
      - edc.datasource.membership.password=issuer

      - edc.iam.oauth2.issuer=http://localhost:8080/realms/logistics-dataspace
      - edc.iam.oauth2.jwks.url=http://host.docker.internal:8080/realms/logistics-dataspace/protocol/openid-connect/certs

      - edc.encryption.aes.key.alias=aes-key-alias
    depends_on:
      - issuer-postgres
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:10010/api/check/readiness"]
      interval: 5s
      timeout: 5s
      retries: 20
