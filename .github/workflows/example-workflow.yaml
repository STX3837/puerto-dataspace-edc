---
name: "Run Tests"

on:
  # run this workflow on pushes on the following branches:
  push:
    branches:
      - main
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  # run this workflow on pull requests
  pull_request:

  # run this workflow on manual trigger
  workflow_dispatch:

# Abort old job when a newer one is queued
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-license-headers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "Check for files without a license header"
        run: |-
          # checks all java, yaml, kts and sql files for an Apache 2.0 license header
          cmd="grep -riL \"SPDX-License-Identifier: Apache-2.0\" --include=\*.{java,yaml,yml,kts,sql} --exclude-dir={.gradle,\*\openapi} ."
          violations=$(eval $cmd | wc -l)
          if [[ $violations -ne 0 ]] ; then
            echo "$violations files without license headers were found:";
            eval $cmd;
            exit 1;
          fi

  verify-checkstyle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-java
      - name: Run Checkstyle
        run: |
          ./gradlew checkstyleMain checkstyleTest

  unit-tests:
    runs-on: ubuntu-latest
    needs: [ verify-license-headers ]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-java
      - name: Run Unit tests
        run: ./gradlew test

  # Verify that both the control plane and data plane are runnable (given some basic config)
  smoke-tests:
    runs-on: ubuntu-latest
    needs: verify-license-headers
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-java

      - name: Build docker images
        run: ./gradlew dockerize

      - name: Create Docker network
        run: docker network create edc-smoke

      - name: Run ControlPlane launcher
        run: |
          docker run -d --rm --name controlplane \
            --network edc-smoke \
            -p 8182:8182 \
            -e "EDC_PARTICIPANT_ID=smoke-provider" \
            -e "EDC_HOSTNAME=controlplane" \
            -e "WEB_HTTP_PORT=8080" \
            -e "WEB_HTTP_PATH=/api" \
            -e "WEB_HTTP_MANAGEMENT_PORT=8182" \
            -e "WEB_HTTP_MANAGEMENT_PATH=/management" \
            -e "WEB_HTTP_MANAGEMENT_AUTH_KEY=password" \
            -e "WEB_HTTP_CONTROL_PORT=10001" \
            -e "WEB_HTTP_CONTROL_PATH=/control" \
            -e "WEB_HTTP_PROTOCOL_PORT=8282" \
            -e "WEB_HTTP_PROTOCOL_PATH=/protocol" \
            -e "EDC_DSP_CALLBACK_ADDRESS=http://controlplane:8282/protocol" \
            -e "EDC_IAM_ISSUER_ID=smoke-provider" \
            -e "EDC_IAM_STS_OAUTH_TOKEN_URL=http://example.com/token" \
            -e "EDC_IAM_STS_OAUTH_CLIENT_ID=client-id" \
            -e "EDC_IAM_STS_OAUTH_CLIENT_SECRET_ALIAS=test-alias" \
            controlplane:latest

      - name: Wait for ControlPlane
        run: |
          for name in consumer-controlplane provider-controlplane; do
            echo "Waiting for $name..."

            for i in {1..60}; do
              if docker logs "$name" 2>&1 | grep -q "Runtime .* ready"; then
                echo "$name ready"
                break
              fi

              if ! docker ps --format '{{.Names}}' | grep -q "^${name}$"; then
                echo "$name exited or does not exist"
                docker ps -a
                docker logs "$name" || true
                exit 1
              fi

              sleep 2
            done
          done

      - name: Run DataPlane launcher
        run: |
          docker run -d --rm --name dataplane \
            --network edc-smoke \
            -e "EDC_PARTICIPANT_ID=smoke-provider" \
            -e "EDC_HOSTNAME=dataplane" \
            -e "WEB_HTTP_PORT=8080" \
            -e "WEB_HTTP_PATH=/api" \
            -e "WEB_HTTP_CONTROL_PORT=10002" \
            -e "WEB_HTTP_CONTROL_PATH=/control" \
            -e "WEB_HTTP_PUBLIC_PORT=8185" \
            -e "WEB_HTTP_PUBLIC_PATH=/public" \
            -e "EDC_DATAPLANE_API_PUBLIC_BASEURL=http://dataplane:8185/public" \
            -e "EDC_DPF_SELECTOR_URL=http://controlplane:10001/control/v1/dataplanes" \
            -e "EDC_TRANSFER_PROXY_TOKEN_VERIFIER_PUBLICKEY_ALIAS=testalias" \
            -e "EDC_TRANSFER_PROXY_TOKEN_SIGNER_PRIVATEKEY_ALIAS=testalias" \
            dataplane:latest

      - name: Wait for DataPlane
        run: |
          for i in {1..60}; do
            if docker logs dataplane 2>&1 | grep -q "Runtime .* ready"; then
              echo "DataPlane ready"
              exit 0
            fi

            if ! docker ps --format '{{.Names}}' | grep -q '^dataplane$'; then
              echo "DataPlane exited"
              docker logs dataplane
              exit 1
            fi

            sleep 2
          done

          echo "DataPlane did not become ready"
          docker logs dataplane
          exit 1

      - name: Test ControlPlane Management API
        run: |
          curl -f -X POST http://localhost:8182/management/v3/assets/request \
            -H "X-Api-Key: password" \
            -H "Content-Type: application/json" \
            -d '{"@context":{"edc":"https://w3id.org/edc/v0.0.1/ns/"},"@type":"edc:QuerySpec"}'

      - name: Print logs on success
        if: always()
        run: |
          docker ps -a
          docker logs controlplane || true
          docker logs dataplane || true